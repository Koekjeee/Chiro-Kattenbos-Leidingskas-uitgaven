<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Samenvatting – Chiro Kattenbos</title>

  <link rel="stylesheet" href="style.css?v=20250926" />

  <script src="https://www.gstatic.com/firebasejs/10.3.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.3.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.3.1/firebase-firestore-compat.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.0/jspdf.plugin.autotable.min.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyC-UaXhh5juhV4raXWnzku9fSZZD75-y9w",
      authDomain: "uitgavebeheerch.firebaseapp.com",
      projectId: "uitgavebeheerch",
      storageBucket: "uitgavebeheerch.firebasestorage.app"
    };

    firebase.initializeApp(firebaseConfig);
  </script>
</head>

<body>
<nav id="mainNav">
  <span>Chiro Kattenbos</span>
  <a href="index.html">Home</a>
  <a id="navBeheer" href="gebruikersbeheer.html">Gebruikersbeheer</a>
  <button id="navTheme" style="display:none;">🌙</button>
  <button id="navLogout" class="push-right" style="display:none;">Uitloggen</button>
</nav>

<div class="container">

  <div id="loginScherm">
    <h2>Inloggen</h2>

    <input type="email" id="loginEmail" placeholder="E-mailadres">
    <input type="password" id="loginWachtwoord" placeholder="Wachtwoord">

    <button id="loginKnop">Inloggen</button>
    <p id="loginFout" style="color:red;"></p>
  </div>

  <div id="appInhoud" style="display:none;">
    <h1>Samenvatting per groep</h1>

    <p id="gebruikerInfo"></p>

    <table id="groepSamenvattingTabel">
      <thead>
        <tr>
          <th>Groep</th>
          <th>Leden</th>
          <th>Totaal (€)</th>
          <th>€ per kind</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <div style="margin-top:12px;">
      <button id="exportPdfBtn">Exporteer naar PDF</button>
    </div>
  </div>

</div>

<script>
(function () {

  const db = firebase.firestore();

  const alleGroepen = [
    "Ribbels",
    "Speelclubs",
    "Rakkers",
    "Kwiks",
    "Tippers",
    "Toppers",
    "Aspi",
    "Keti's",
    "4uurtje",
    "Algemeen",
    "LEIDING"
  ];

  const groepKleuren = {
    Ribbels: "rgba(59,130,246,0.18)",
    Speelclubs: "rgba(234,179,8,0.18)",
    Rakkers: "rgba(34,197,94,0.18)",
    Kwiks: "rgba(244,114,182,0.18)",
    Tippers: "rgba(99,102,241,0.18)",
    Toppers: "rgba(16,185,129,0.18)",
    Aspi: "rgba(249,115,22,0.18)",
    "Keti's": "rgba(56,189,248,0.18)",
    "4uurtje": "rgba(168,85,247,0.18)",
    Algemeen: "rgba(0,0,0,0.12)",
    LEIDING: "rgba(148,163,184,0.18)"
  };

  let gebruikersData = null;
  let ledenMap = {};
  let totalenPerGroep = {};

  let unsubLeden = null;
  let unsubUitgaven = null;

  const $ = (id) => document.getElementById(id);

  function euro(n) {
    return "€" + (Number(n) || 0).toFixed(2);
  }

  function parseEuro(input) {
    if (typeof input === "number") return input;

    const s = String(input || "").trim().replace(",", ".");
    const v = Number(s);

    return isNaN(v) ? 0 : v;
  }

  function kleurVoorGroep(groep) {
    return groepKleuren[groep] || "rgba(148,163,184,0.12)";
  }

  function bouwTabel() {
    const tbody = document.querySelector("#groepSamenvattingTabel tbody");
    if (!tbody) return;

    tbody.innerHTML = "";

    alleGroepen.forEach(groep => {

      const leden = Number(ledenMap[groep] || 0);
      const totaal = Number(totalenPerGroep[groep] || 0);
      const perKind = leden > 0 ? totaal / leden : 0;

      const tr = document.createElement("tr");
      tr.style.backgroundColor = kleurVoorGroep(groep);

      tr.innerHTML = `
        <td>${groep}</td>
        <td>${leden}</td>
        <td>${euro(totaal)}</td>
        <td>${leden > 0 ? euro(perKind) : "-"}</td>
      `;

      tbody.appendChild(tr);
    });
  }

  function startListeners() {

    if (unsubLeden) unsubLeden();
    if (unsubUitgaven) unsubUitgaven();

    unsubLeden = db.collection("config")
      .doc("ledenPerGroep")
      .onSnapshot(doc => {
        ledenMap = doc.exists ? doc.data() : {};
        bouwTabel();
      });

    unsubUitgaven = db.collection("uitgaven")
      .onSnapshot(snapshot => {

        const map = {};
        alleGroepen.forEach(g => map[g] = 0);

        snapshot.forEach(doc => {
          const data = doc.data();
          const groep = data.groep;
          const bedrag = parseEuro(data.bedrag);

          if (map[groep] !== undefined) {
            map[groep] += bedrag;
          }
        });

        totalenPerGroep = map;
        bouwTabel();
      });
  }

  firebase.auth().onAuthStateChanged(async (user) => {

    if (!user) {
      $("#loginScherm").style.display = "block";
      $("#appInhoud").style.display = "none";
      $("#navLogout").style.display = "none";
      $("#navTheme").style.display = "none";
      $("#navBeheer").style.display = "none";
      return;
    }

    const snap = await db.collection("gebruikers").doc(user.uid).get();
    gebruikersData = snap.exists ? snap.data() : {};

    $("#loginScherm").style.display = "none";
    $("#appInhoud").style.display = "block";

    $("#gebruikerInfo").textContent =
      "Ingelogd als " +
      (gebruikersData.rol || "-") +
      " (" +
      (gebruikersData.groep || "-") +
      ")";

    $("#navBeheer").style.display =
      gebruikersData.rol === "financieel" ? "inline" : "none";

    $("#navTheme").style.display = "inline";
    $("#navLogout").style.display = "inline";

    startListeners();
  });

  const loginBtn = $("#loginKnop");
  if (loginBtn) {
    loginBtn.addEventListener("click", async () => {

      const email = $("#loginEmail").value.trim();
      const wachtwoord = $("#loginWachtwoord").value.trim();

      try {
        await firebase.auth().signInWithEmailAndPassword(email, wachtwoord);
        $("#loginFout").textContent = "";
      } catch (err) {
        $("#loginFout").textContent = "Login mislukt.";
      }
    });
  }

  const logoutBtn = $("#navLogout");
  if (logoutBtn) {
    logoutBtn.addEventListener("click", async () => {
      await firebase.auth().signOut();
    });
  }

  const themeBtn = $("#navTheme");
  if (themeBtn) {
    themeBtn.addEventListener("click", () => {

      const huidig = document.body.dataset.theme || "dark";
      const nieuw = huidig === "dark" ? "light" : "dark";

      document.body.dataset.theme = nieuw;
      localStorage.setItem("theme", nieuw);

      themeBtn.textContent = nieuw === "light" ? "🌞" : "🌙";
    });
  }

  function exportSamenvattingPdf() {

    const jspdfNS = window.jspdf || {};
    const jsPDF = jspdfNS.jsPDF;

    if (!jsPDF) return;

    const doc = new jsPDF();

    const rows = [];

    alleGroepen.forEach(groep => {

      const leden = Number(ledenMap[groep] || 0);
      const totaal = Number(totalenPerGroep[groep] || 0);
      const perKind = leden > 0 ? totaal / leden : 0;

      rows.push([
        groep,
        leden,
        euro(totaal),
        leden > 0 ? euro(perKind) : "-"
      ]);
    });

    doc.text("Samenvatting per groep", 14, 15);

    doc.autoTable({
      head: [["Groep", "Leden", "Totaal (€)", "€ per kind"]],
      body: rows,
      startY: 25
    });

    doc.save("samenvatting.pdf");
  }

  const exportBtn = $("#exportPdfBtn");
  if (exportBtn) {
    exportBtn.addEventListener("click", exportSamenvattingPdf);
  }

})();
</script>

</body>
</html>
